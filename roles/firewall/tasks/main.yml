---
# UFW firewall rules

- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  tags: [firewall, ufw]

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny
  tags: [firewall, ufw]

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow
  tags: [firewall, ufw]

- name: Allow SSH port {{ ufw_ssh_port }}
  community.general.ufw:
    rule: allow
    port: "{{ ufw_ssh_port }}"
    proto: tcp
    comment: "SSH access"
  tags: [firewall, ufw]

- name: Allow Tailscale UDP port 41641
  community.general.ufw:
    rule: allow
    port: "41641"
    proto: udp
    comment: "Tailscale WireGuard"
  tags: [firewall, ufw]

- name: Enable UFW
  community.general.ufw:
    state: enabled
  notify: Restart ufw
  tags: [firewall, ufw]

- name: Configure fail2ban
  ansible.builtin.include_tasks: fail2ban.yml
  tags: [firewall, fail2ban]
